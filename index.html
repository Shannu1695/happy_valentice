
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Valentine's Day My Love ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Great+Vibes&family=Inter:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fff5f7;
        scroll-behavior: smooth;
      }
      .font-handwriting {
        font-family: 'Dancing Script', cursive;
      }
      .font-romantic {
        font-family: 'Great Vibes', cursive;
      }
      .font-cute {
        font-family: 'Pacifico', cursive;
      }
      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
      }
      .floating-heart {
        position: fixed;
        bottom: -50px;
        pointer-events: none;
        animation: float linear infinite;
        z-index: 0;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #fff5f7;
      }
      ::-webkit-scrollbar-thumb {
        background: #fda4af;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #fb7185;
      }
    </style>
